<!DOCTYPE html>

<body>

    <section class="d01">
        <div class="title">
            <h2>커피 한 잔의 여유</h2>

        </div>
    </section>

    <section class="d02">
        <div class="title">
            <h2>원두 이야기</h2>
            <p>산지별 원두가 가진 향과 맛의 차이를 경험해보세요.</p>
        </div>
    </section>

    <section class="d03">

            <h2>브루잉 방식</h2>
            <p>추출 방법에 따라 달라지는 커피의 매력을 담았습니다.</p>
        </div>

        <div class="inner">
            핸드드립, 프렌치프레스, 에스프레소 등 다양한 방식으로 즐길 수 있습니다.
        </div>
    </section>


    <section class="notice">
        <div class="title">
            <h2>NOTICE</h2>
        </div>

        <div class="inner">
            <div class="tab_area">
                <ul class="tab_menu">
                    <li class="on">
                        <button type="button">공지사항</button>
                    </li>
                    <li>
                        <button type="button">이벤트</button>
                    </li>
                    <li>
                        <button type="button">FAQ</button>
                    </li>
                </ul>

                <ul class="tab_content">
                    <li class="on">
                        <p>신규 원두 입고 및 매장 운영 안내입니다.</p>
                    </li>
                    <li>
                        <p>4월 한정 커피 할인 이벤트를 진행합니다.</p>
                    </li>
                    <li>
                        <p>매장 이용 관련 자주 묻는 질문을 확인하세요.</p>
                    </li>
                </ul>
            </div>
